21:
  description: FTP transmits credentials and file data in plaintext, making it vulnerable
    to credential sniffing. Many FTP servers also allow anonymous access by default.
    Replace FTP with SFTP (SSH File Transfer Protocol) or FTPS (FTP over TLS).
  risk_level: High
  service: FTP
22:
  description: SSH is the recommended secure remote access protocol, but exposed SSH
    services are frequent brute-force targets. Ensure password authentication is disabled
    in favor of key-based auth, and consider using fail2ban or similar rate-limiting.
    Outdated OpenSSH versions may be vulnerable (e.g. regreSSHion, CVE-2024-6387).
  risk_level: Medium
  service: SSH
23:
  description: "Telnet transmits all data \u2014 including usernames and passwords\
    \ \u2014 in plaintext. Any attacker on the same network segment can capture credentials\
    \ with a packet sniffer. Telnet should be disabled and replaced with SSH."
  risk_level: Critical
  service: Telnet
25:
  description: An open SMTP relay can be abused to send spam or phishing emails, which
    may get the server's IP blacklisted. Ensure SMTP requires authentication and is
    configured to reject relay from untrusted sources.
  risk_level: High
  service: SMTP
53:
  description: An open DNS resolver can be abused for DNS amplification DDoS attacks.
    If this is an internal DNS server, ensure it does not respond to queries from
    external networks. Also check that zone transfers (AXFR) are restricted to authorized
    secondaries.
  risk_level: Medium
  service: DNS
80:
  description: "HTTP serves web content without encryption. Any data transmitted \u2014\
    \ including session cookies and form submissions \u2014 can be intercepted. Migrate\
    \ to HTTPS (port 443) and configure HTTP to redirect to HTTPS automatically."
  risk_level: Medium
  service: HTTP
110:
  description: POP3 retrieves email over an unencrypted connection. Credentials and
    email contents are transmitted in plaintext. Use POP3S (port 995) with TLS encryption
    instead.
  risk_level: Medium
  service: POP3
111:
  description: RPCbind (Portmapper) maps RPC services to network ports. It can leak
    system metadata about available services and can be abused in UDP amplification
    attacks. Filter access to trusted hosts.
  risk_level: Medium
  service: RPCbind
135:
  description: Microsoft RPC endpoint mapper has been the target of numerous remote
    code execution exploits (e.g. MS03-026, used by the Blaster worm). It should not
    be exposed beyond the local network segment and should be filtered by host-based
    firewalls.
  risk_level: High
  service: MS-RPC
139:
  description: NetBIOS Session Service enables file and printer sharing on older Windows
    networks. It leaks system information (computer name, domain, logged-in users)
    and can be used for lateral movement. Disable NetBIOS over TCP/IP if SMB direct
    (port 445) is available.
  risk_level: High
  service: NetBIOS
143:
  description: IMAP retrieves email over an unencrypted connection. Credentials and
    email contents are transmitted in plaintext. Use IMAPS (port 993) with TLS encryption
    instead.
  risk_level: Medium
  service: IMAP
161:
  description: 'SNMP v1/v2c use community strings transmitted in plaintext (default:
    ''public''/''private''). An attacker with read access can enumerate the entire
    device configuration; with write access they can reconfigure it. Upgrade to SNMPv3
    with authentication and encryption.'
  risk_level: High
  service: SNMP
389:
  description: Lightweight Directory Access Protocol (LDAP) transmits queries and
    credentials in plaintext. Attackers can sniff traffic to steal passwords or enumerate
    users and groups. LDAP should be disabled in favor of LDAPS or LDAP with StartTLS.
  risk_level: High
  service: LDAP
443:
  description: HTTPS provides encrypted web communication. While generally secure,
    verify that the TLS configuration uses modern protocols (TLS 1.2+) and strong
    cipher suites. Weak configurations may be vulnerable to downgrade attacks.
  risk_level: Low
  service: HTTPS
445:
  description: SMB (Server Message Block) has been the target of multiple devastating
    exploits, including EternalBlue (CVE-2017-0144) which powered the WannaCry ransomware
    outbreak. Exposing port 445 to a network allows file-share enumeration, credential
    relay attacks, and lateral movement. SMB should be restricted to trusted hosts
    via firewall rules and kept fully patched.
  risk_level: Critical
  service: SMB
502:
  description: Modbus is an industrial control protocol (SCADA/ICS) that lacks authentication
    by default. An exposed Modbus port allows anyone to read or write registers on
    a PLC, potentially causing physical infrastructure damage. Isolate on a strict
    OT network.
  risk_level: Critical
  service: Modbus
587:
  description: Port 587 is the standard mail submission port, which typically requires
    authentication and supports STARTTLS. This is the recommended way to send email.
    Ensure STARTTLS is enforced (not optional).
  risk_level: Low
  service: SMTP-Submission
636:
  description: LDAPS is the secure, TLS-encrypted version of LDAP. While generally
    secure against sniffing, ensure the TLS certificate is valid and strong cipher
    suites are enforced.
  risk_level: Low
  service: LDAPS
993:
  description: IMAPS is the TLS-encrypted version of IMAP. This is the recommended
    configuration for email retrieval. Verify the TLS certificate is valid and protocols
    are up to date.
  risk_level: Low
  service: IMAPS
995:
  description: POP3S is the TLS-encrypted version of POP3. This is the recommended
    configuration. Verify TLS certificate validity.
  risk_level: Low
  service: POP3S
1433:
  description: "Microsoft SQL Server exposed on the network allows attackers to attempt\
    \ authentication brute-force or exploit known vulnerabilities (e.g. the 'sa' account\
    \ with a weak password). Database ports should never be directly accessible from\
    \ untrusted networks \u2014 use firewall rules to restrict access to application\
    \ servers only."
  risk_level: Critical
  service: MS-SQL
1723:
  description: Point-to-Point Tunneling Protocol (PPTP) is a deprecated VPN protocol.
    Its authentication (MS-CHAPv2) is cryptographically broken and can be cracked
    easily to intercept VPN traffic. Replace with OpenVPN, L2TP/IPsec, or WireGuard.
  risk_level: High
  service: PPTP
1900:
  description: Universal Plug and Play (UPnP) is often enabled on local routers and
    IoT devices. It is vulnerable to SSDP amplification DDoS attacks and can sometimes
    be manipulated to expose internal devices to the internet. UPnP should generally
    be disabled.
  risk_level: Medium
  service: UPnP
2049:
  description: Network File System (NFS) shares, if misconfigured, can allow unauthorized
    hosts to mount and read/write file systems. Ensure exports are restricted to specific
    IPs and use NFSv4 with Kerberos authentication where possible.
  risk_level: Medium
  service: NFS
2222:
  description: Port 2222 is a frequently used alternate port for SSH. Moving SSH to
    a non-standard port reduces log noise from automated scanners, but does not replace
    the need for key-based authentication and proper hardening.
  risk_level: Low
  service: SSH-Alt
2375:
  description: Unprotected Docker daemon APIs allow attackers to spin up containers,
    mount the host system's root filesystem, and achieve full remote code execution
    (RCE) on the host. Secure the API with TLS client certificates or bind it to localhost
    only.
  risk_level: Critical
  service: Docker
2376:
  description: While encrypted, the Docker daemon API is exposed. If mutual TLS (mTLS)
    is not properly configured, an attacker could still interact with the daemon to
    achieve container escape and host compromise. Ensure strong authentication is
    enforced.
  risk_level: Critical
  service: Docker-TLS
3306:
  description: MySQL exposed on the network is a high-value target. Default installations
    sometimes allow root login without a password. Attackers can enumerate databases,
    extract sensitive data, or leverage SQL injection from a compromised web application.
    Bind MySQL to 127.0.0.1 unless remote access is required, and enforce strong authentication.
  risk_level: Critical
  service: MySQL
3389:
  description: Remote Desktop Protocol is one of the most commonly brute-forced services
    on the internet. It has also been affected by critical vulnerabilities such as
    BlueKeep (CVE-2019-0708), which allows unauthenticated remote code execution.
    RDP should be placed behind a VPN or secured with Network Level Authentication
    (NLA) and strong passwords.
  risk_level: Critical
  service: RDP
5060:
  description: Session Initiation Protocol (SIP) is used for VoIP. Exposed SIP ports
    are frequent targets of SIP scanning, toll fraud, and authentication brute-forcing.
    Ensure strong credentials and rate limiting are applied.
  risk_level: Medium
  service: SIP
5432:
  description: PostgreSQL exposed to the network risks unauthorized data access. Misconfigured
    pg_hba.conf files can allow connections from any host. Like all databases, PostgreSQL
    should be firewalled to accept connections only from known application servers.
  risk_level: Critical
  service: PostgreSQL
5900:
  description: VNC provides remote desktop access and many implementations use weak
    or no authentication by default. Unencrypted VNC sessions can be captured. Use
    SSH tunneling or a VPN to secure VNC, and enforce strong passwords.
  risk_level: High
  service: VNC
5985:
  description: Windows Remote Management (WinRM) over HTTP allows remote administration.
    It is subject to brute-forcing, password-spraying, and lateral movement within
    corporate networks. It should be heavily firewalled and restricted to dedicated
    admin subnets.
  risk_level: High
  service: WinRM
5986:
  description: Windows Remote Management (WinRM) over HTTPS provides encryption but
    still exposes remote administrative access. It remains a prime target for credential
    attacks and lateral movement. Restrict access using network firewalls.
  risk_level: High
  service: WinRM-HTTPS
6379:
  description: Redis, by default, does not require authentication and binds to all
    interfaces. An exposed Redis instance can be used to read/write arbitrary data,
    or even achieve remote code execution via crafted commands (CONFIG SET). Always
    require a password and bind to 127.0.0.1.
  risk_level: High
  service: Redis
8080:
  description: Port 8080 is commonly used for development web servers, proxy servers,
    or administrative panels. These often lack the hardening applied to production
    services on port 80/443. Verify this service is intentional and properly secured.
  risk_level: Medium
  service: HTTP-Alt
8443:
  description: Port 8443 is an alternate HTTPS port frequently used for management
    interfaces (e.g. VMware, Tomcat admin). While encrypted, these admin panels may
    expose sensitive configuration capabilities. Restrict access to authorized administrators.
  risk_level: Medium
  service: HTTPS-Alt
8500:
  description: Consul provides service discovery and key-value storage. If exposed
    without authentication, attackers can read/write KV entries or register malicious
    services with health checks that execute arbitrary commands on the server.
  risk_level: Critical
  service: Consul
9100:
  description: Port 9100 is used for RAW network printing. Printer ports are usually
    unauthenticated and can be abused to capture print jobs, spam the printer, or
    manipulate device firmware. Isolate printers on dedicated VLANs.
  risk_level: Medium
  service: JetDirect
9200:
  description: Elasticsearch databases are frequently targeted by automated ransomware
    bots when bound to untrusted interfaces without authentication. Attackers can
    read, modify, or delete massive amounts of data. Bind to 127.0.0.1 and enable
    security features.
  risk_level: High
  service: Elasticsearch
10250:
  description: The Kubernetes Kubelet API allows for command execution inside containers.
    If exposed and unauthenticated, it can lead to complete cluster compromise. Restrict
    access and ensure anonymous authentication is disabled.
  risk_level: Critical
  service: Kubelet
11211:
  description: Memcached exposed to the network can be abused for DDoS amplification
    attacks (amplification factor of up to 51,000x). It also has no built-in authentication,
    so cached data can be read or flushed by anyone. Bind to 127.0.0.1.
  risk_level: High
  service: Memcached
27017:
  description: MongoDB has historically shipped with no authentication enabled by
    default. Thousands of exposed MongoDB instances have been ransomed. Enable authentication,
    bind to localhost, and use firewall rules to restrict access.
  risk_level: High
  service: MongoDB
